<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Opterra - Powerful Sales Solution v1.03</title>
    
    <!-- PWA Icons & Meta -->
    <link rel="icon" href="https://i.postimg.cc/g0Ymk2vy/opterra.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/g0Ymk2vy/opterra.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Opterra">

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #334155; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Fixed Header & Tabs */
        header { background: #fff; padding: 0 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; }
        header img { height: 35px; }
        nav { background: #fff; display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
        .tab-btn { padding: 15px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #64748b; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* Scrollable Content */
        main { flex: 1; overflow-y: auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #fff; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1rem; }

        /* Forms & Tables */
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 20px; font-weight: 600; }
        .primary-btn { background: var(--primary); color: white; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }

        /* Modal & Splash */
        #splash { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="splash"><img src="https://i.postimg.cc/wMTdgfLg/opterrasplashscreen.gif" style="width:150px"></div>

    <header>
        <img src="https://i.postimg.cc/g0Ymk2vy/opterra.png" alt="Opterra">
        <div id="live-time" style="font-size: 0.85rem; font-weight: bold;"></div>
    </header>

    <nav>
        <button class="tab-btn active" onclick="switchTab('dashboard', this)">Dashboard</button>
        <button class="tab-btn" onclick="switchTab('opportunities', this)">Opportunities</button>
        <button class="tab-btn" onclick="switchTab('bookings', this)">Bookings</button>
    </nav>

    <main>
        <div id="dashboard" class="page active">
            <h2>Dashboard</h2>
            <div class="card">Active Opportunities: <strong id="lead-count">0</strong></div>
        </div>

        <div id="opportunities" class="page">
            <div class="card">
                <form id="oppForm" class="grid-form">
                    <input type="text" id="name" placeholder="Client Name" required>
                    <input type="tel" id="number" placeholder="Phone Number">
                    <input type="text" id="config" placeholder="Configuration">
                    <input type="text" id="carpet" placeholder="Carpet Area">
                    <input type="number" id="budget" placeholder="Budget">
                    <select id="source" onchange="toggleCP(this.value)">
                        <option value="direct">Direct</option>
                        <option value="channel">Channel Partner</option>
                    </select>
                    <input type="text" id="sManager" placeholder="Sourcing Manager">
                    <div id="cpFields" class="grid-form" style="display:none; grid-column: 1 / -1;">
                        <input type="text" id="cpName" placeholder="CP Name">
                        <input type="text" id="cpFirm" placeholder="CP Firm Name">
                        <input type="text" id="cpContact" placeholder="CP Contact">
                    </div>
                    <button type="button" class="primary-btn" onclick="addLead()">Add Opportunity</button>
                </form>
            </div>
            <table id="oppTable"><thead><tr><th>Client</th><th>Action</th></tr></thead><tbody></tbody></table>
        </div>

        <div id="bookings" class="page"><h2>Bookings</h2><p>No bookings yet.</p></div>
    </main>

    <div id="leadModal" class="modal">
        <div class="modal-content">
            <h3>Update Lead</h3>
            <div id="history" style="font-size: 0.8rem; margin-bottom: 10px; max-height: 100px; overflow-y: auto; background: #f1f5f9; padding: 5px;"></div>
            <textarea id="updRemark" placeholder="New Remark" style="margin-bottom: 10px;"></textarea>
            <input type="date" id="updDate" style="margin-bottom: 10px;">
            <button class="primary-btn" onclick="saveUpdate()">Save Update</button>
            <button onclick="document.getElementById('leadModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        let leads = JSON.parse(localStorage.getItem('leads') || '[]');
        let currentIdx = null;

        window.addEventListener('load', () => setTimeout(() => document.getElementById('splash').style.display = 'none', 600));

        function switchTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function toggleCP(val) { document.getElementById('cpFields').style.display = (val === 'channel') ? 'grid' : 'none'; }

        function addLead() {
            const name = document.getElementById('name').value;
            if(!name) return;
            leads.push({ name, history: [] });
            localStorage.setItem('leads', JSON.stringify(leads));
            renderTable();
            document.getElementById('oppForm').reset();
        }

        function renderTable() {
            const tbody = document.querySelector('#oppTable tbody');
            tbody.innerHTML = leads.map((l, i) => `<tr><td>${l.name}</td><td><button onclick="openModal(${i})">View</button></td></tr>`).join('');
            document.getElementById('lead-count').innerText = leads.length;
        }

        function openModal(i) {
            currentIdx = i;
            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = leads[i].history.map(h => `<div><b>${h.date}:</b> ${h.remark}</div>`).join('');
            document.getElementById('leadModal').style.display = 'flex';
        }

        function saveUpdate() {
            const remark = document.getElementById('updRemark').value;
            const date = new Date().toLocaleString();
            leads[currentIdx].history.push({ remark, date });
            localStorage.setItem('leads', JSON.stringify(leads));
            document.getElementById('leadModal').style.display = 'none';
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleDateString('en-GB') + ' ' + now.toLocaleTimeString('en-US');
        }, 1000);

        renderTable();
    </script>
</body>
</html>
